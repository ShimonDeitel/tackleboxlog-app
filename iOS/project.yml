name: TackleBoxLog
options:
  bundleIdPrefix: com.shimondeitel.tackleboxlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  TackleBoxLog:
    type: application
    platform: iOS
    sources:
      - path: TackleBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tackleboxlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: TackleBoxLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TackleBoxLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TackleBoxLogTests
      - path: TackleBoxLog.storekit
    dependencies:
      - target: TackleBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tackleboxlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TackleBoxLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TackleBoxLogUITests
    dependencies:
      - target: TackleBoxLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tackleboxlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  TackleBoxLog:
    build:
      targets:
        TackleBoxLog: all
        TackleBoxLogTests: [test]
        TackleBoxLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: TackleBoxLog.storekit
    test:
      config: Debug
      storeKitConfiguration: TackleBoxLog.storekit
      targets:
        - TackleBoxLogTests
        - TackleBoxLogUITests
    archive:
      config: Release
